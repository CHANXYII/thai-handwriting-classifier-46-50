<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4facfe">
    <title>ระบบวิเคราะห์เลขไทย ๔๖ – ๕๐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap');
        
        * { box-sizing: border-box; }
        
        :root {
            --stone-base: #c2b9ae;
            --stone-light: #e0d7cd;
            --stone-dark: #8c8278;
            --stone-border: #756a5e;
            --accent-base: #c9a227;
            --accent-light: #f4d97a;
            --accent-glow: #ffefb0;
            --accent-text: #4e342e;
            --ink: #3e2723;
            --text-main: #4e342e;
            --font-main: 'Mali', cursive;
            --font-ui: 'Prompt', sans-serif;
        }

        html, body { height: 100%; margin: 0; overflow: hidden; }
        
        body {
            font-family: var(--font-ui);
            color: rgb(33, 10, 10);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }

        /* Video Background */
        #bgVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
            filter: brightness(0.7) contrast(1.1);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.6));
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: row;
            padding: 20px;
            gap: 30px;
            height: 90vh;
        }

        /* --- Main Stage --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .app-title {
            font-family: var(--font-main);
            flex-direction:column;
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8), 0 0 20px rgba(100, 181, 246, 0.4);
            font-size: clamp(28px, 4.5vw, 48px);
            margin: 0 0 20px 0;
            text-align: center;
            line-height: 1;
        }
        .app-title span {
            display: block;
            font-size: 0.4em;
            font-family: var(--font-ui);
            text-transform: uppercase;
            letter-spacing: 8px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .board-wrapper {
            position: relative;
            
        }
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(0.5deg); }
        }

        .stone-board {
            width: 440px;
            aspect-ratio: 1;
            background-color: var(--stone-base);
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E"),
                linear-gradient(135deg, var(--stone-light) 0%, var(--stone-dark) 100%);
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 2px 2px 5px rgba(255,255,255,0.4);
            position: relative;
            border: 1px solid rgba(0,0,0,0.3);
        }

        .canvas-area {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            position: relative;
            background-color: var(--stone-light);
            box-shadow: inset 10px 10px 25px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 2px solid rgba(0,0,0,0.15);
        }

        canvas#drawCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .hint-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-main);
            font-size: 28px;
            color: rgba(62, 39, 35, 0.2);
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .hint-text.hidden { opacity: 0; }

        .scan-line {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent, #ffefb0, transparent);
            height: 15%;
            top: -20%;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 0 30px var(--accent-base);
        }
        .scan-line.active {
            opacity: 1;
            animation: dataScan 1.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        @keyframes dataScan {
            0% { top: -20%; }
            100% { top: 110%; }
        }

        /* --- 3D Buttons --- */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
        }

        .btn-3d {
            background-color: var(--stone-base);
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E"),
                linear-gradient(to bottom, var(--stone-light), var(--stone-base));
            border: 1px solid rgba(0,0,0,0.2);
            padding: 14px 35px;
            font-family: var(--font-main);
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 10px 0 var(--stone-dark), 0 15px 25px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            position: relative;
            transform: translateY(0);
        }

        #btnPredict {
            background-color: #5d4037;

            background-image:linear-gradient(to bottom, #795548, #4e342e);

            color: #f5e6d3;

            box-shadow:
                0 10px 0 #3e2723,
                0 15px 30px rgba(0,0,0,0.55),
                0 0 20px rgba(121,85,72,0.25);
}
        

        .btn-3d:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #3e2723;
        }
        #btnPredict:active { box-shadow: 0 2px 0 #4e342e; }
        .btn-3d:disabled { filter: grayscale(0.8); opacity: 0.6; cursor: wait; }

        /* --- Sidebar --- */
        .sidebar {
            width: 340px;
            background: #4e342e;
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: -20px 0 50px rgba(0,0,0,0.5);
        }

        .panel-section {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .section-title {
            color: var(--accent-light);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
            opacity: 0.8;
        }

        .result-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
        }

        .output-digit {
            font-family: var(--font-main);
            font-size: 72px;
            color: var(--accent-light);
            text-shadow: 0 0 12px rgba(255, 212, 56, 0.6),0 0 28px rgb(102, 81, 10);
            line-height: 1;
        }
        .output-digit.empty { color: rgba(255,255,255,0.1); text-shadow: none; }

        .accuracy-box { text-align: right; }
        .accuracy-lbl { font-size: 10px; color: #ffffff; text-transform: uppercase; margin-bottom: 5px; }
        .accuracy-val { font-size: 28px; font-weight: 700; color: #fff; }

        /* Probabilities */
        .prob-bar-container { margin-bottom: 12px; }
        .prob-label { display: flex; justify-content: space-between; font-size: 14px; color: #eee; margin-bottom: 6px; }
        .prob-track { height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; overflow: hidden; }
        .prob-fill { height: 100%; background: linear-gradient(90deg, #c9a227, #f4d97a); width: 0%; transition: width 1s cubic-bezier(0.2, 0.8, 0.2, 1);box-shadow: 0 0 10px rgba(201,162,39,0.4);}
        .prob-bar-container.top .prob-fill { background: linear-gradient(90deg, #c9a227, #fff4c2); box-shadow: 0 0 15px rgba(244,217,122,0.65); }

        .status-log {
            text-align: center;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: auto;
            padding-top: 15px;
        }
        .status-log.busy { color: rgba(255,255,255,0.4); animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }

        @media (max-width: 900px) {
            .app-container { flex-direction: column; height: auto; padding: 10px; }
            .sidebar { width: 100%; max-width: 440px; }
            .stone-board { width: 100%; max-width: 360px; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bgVideo">
        <source src="/static/ธรรมชาติ2.mp4" type="video/mp4">
    </video>

    <div class="app-container">
        <main class="main-content">
            <h1 class="app-title">
                <span>วิชา AIE322 Supervised Learning</span>
                ทำนายเลขไทย ๔๖-๕๐ ด้วย AI
            </h1>

            <div class="board-wrapper">
                <div class="stone-board">
                    <div class="canvas-area">
                        <canvas id="drawCanvas" width="360" height="360"></canvas>
                        <div class="hint-text" id="hintText">จารึกตัวเลขที่นี่</div>
                        <div class="scan-line" id="scanLine"></div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn-3d btn-nav" onclick="window.location.href='/history'">◀ ประวัติ </button>
                <button class="btn-3d" id="btnClear">ลบลายมือ</button>
                <button class="btn-3d" id="btnPredict">เริ่มทำนาย</button>
                <button class="btn-3d btn-nav" onclick="window.location.href='/admin'">▶ Admin </button>
            </div>
        </main>


        <aside class="sidebar">
            <div class="panel-section">
                <div class="body">ผลการทำนาย</div>
                <div class="result-card">
                    <div class="output-digit empty" id="prediction">?</div>
                    <div class="accuracy-box">
                        <div class="accuracy-lbl">ความแม่นยำ</div>
                        <div class="accuracy-val" id="confValue">--%</div>
                    </div>
                </div>
            </div>
            <div class="panel-section" id="feedbackSection" style="display:none;">
                <div class="body">ผลการประเมิน AI</div>

                <div style="display:flex; gap:12px; margin-top:15px;">
                    <button class="btn-3d" id="btnCorrect" style=" flex:1; font-size:18px; padding:12px;">✅ ทายถูก</button>
                    <button class="btn-3d" id="btnWrong" style=" flex:1; font-size:18px; padding:12px;">❌ ทายผิด</button>
                </div>
            </div>


        <div class="panel-section" id="probContainer">
                <div class="body">การกระจายความน่าจะเป็น</div>
                <div id="probList" style="text-align:center; color: rgba(255,255,255,0.4); font-size:12px; padding:20px 0;">รอรับข้อมูลการวิเคราะห์...</div>
            </div>
            <div class="status-log" id="statusText">พร้อมประมวลผลข้อมูล</div>
        </aside>
    </div>

    <script>
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const btnPredict = document.getElementById('btnPredict');
        const btnClear = document.getElementById('btnClear');
        const statusText = document.getElementById('statusText');
        const predictionEl = document.getElementById('prediction');
        const confValueEl = document.getElementById('confValue');
        const probListEl = document.getElementById('probList');
        const scanLine = document.getElementById('scanLine');
        const hintText = document.getElementById('hintText');
        const feedbackSection = document.getElementById('feedbackSection');
        const btnCorrect = document.getElementById('btnCorrect');
        const btnWrong = document.getElementById('btnWrong');
        let latestPredictionId = null;
        
        const THAI_DIGITS = ['๐','๑','๒','๓','๔','๕','๖','๗','๘','๙'];

        let drawing = false, hasInk = false;

        function initCanvas() {
            ctx.lineWidth = 20;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#3e2723';
            ctx.fillStyle = '#e0d7cd';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - rect.left) * sx, y: (cy - rect.top) * sy };
        }

        canvas.addEventListener('mousedown', (e) => { drawing = true; hasInk = true; hintText.classList.add('hidden'); const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', (e) => { if (!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
        window.addEventListener('mouseup', () => drawing = false);
        
        canvas.addEventListener('touchstart', (e) => { drawing = true; hasInk = true; hintText.classList.add('hidden'); const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { if (!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, {passive: false});
        canvas.addEventListener('touchend', () => drawing = false);

        function setStatus(msg, busy = false) {
            statusText.textContent = msg;
            statusText.className = 'status-log' + (busy ? ' busy' : '');
        }

        btnClear.addEventListener('click', () => {
            initCanvas(); hasInk = false; hintText.classList.remove('hidden');
            predictionEl.textContent = '?'; predictionEl.classList.add('empty');
            confValueEl.textContent = '--%'; 
            probListEl.innerHTML = '<div style="text-align:center; color:#555; font-size:12px; padding:20px 0;">รอรับข้อมูลการวิเคราะห์...</div>';
            setStatus('พร้อมประมวลผลข้อมูล');
                feedbackSection.style.display = 'none';
                latestPredictionId = null;
        });

        // ✨ EFFECT: Scramble Reveal
        function scrambleReveal(targetStr, duration = 800) {
            predictionEl.classList.remove('empty');
            const start = performance.now();
            const length = targetStr.length;
            
            function update(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                
                if (progress < 1) {
                    let result = "";
                    for (let i = 0; i < length; i++) {
                        if (progress > (i / length) * 0.7 + 0.3) {
                            result += targetStr[i];
                        } else {
                            result += THAI_DIGITS[Math.floor(Math.random() * 10)];
                        }
                    }
                    predictionEl.textContent = result;
                    requestAnimationFrame(update);
                } else {
                    predictionEl.textContent = targetStr;
                }
            }
            requestAnimationFrame(update);
        }

        // ✨ EFFECT: Smooth Count-up
        function countTo(targetNum, duration = 1000) {
            const start = performance.now();
            function update(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3); // Cubic Ease Out
                confValueEl.textContent = (targetNum * eased).toFixed(1) + '%';
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        // ✨ CORE: PREDICTION (CONNECTS TO BACKEND)
        async function predictDigit() {
            if (!hasInk) { setStatus("กรุณาวาดตัวเลขลงบนแผ่นหิน", true); return; }
            btnPredict.disabled = true;
            setStatus("AI กำลังวิเคราะห์โครงสร้างเส้น...", true);
            scanLine.classList.add('active');
            
            try {
                // Pre-process: Force white background for the model
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.fillStyle = '#ffffff'; tempCtx.fillRect(0, 0, canvas.width, canvas.height);
                tempCtx.drawImage(canvas, 0, 0);
                
                const response = await fetch('/predict', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({image: tempCanvas.toDataURL('image/png')})
                });
                
                if (!response.ok) throw new Error("Backend Error");
                const data = await response.json();
                
                // Trigger Visual Effects
                scrambleReveal(String(data.prediction));
                countTo(data.confidence * 100);
                
                // Render List
                probListEl.innerHTML = '';
                Object.entries(data.probabilities).sort((a,b)=>b[1]-a[1]).forEach(([lbl, val]) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'prob-bar-container' + (lbl === data.prediction ? ' top' : '');
                    wrap.innerHTML = `
                        <div class="prob-label"><span>เลข ${lbl}</span><span>${(val*100).toFixed(1)}%</span></div>
                        <div class="prob-track"><div class="prob-fill" style="width:${val*100}%"></div></div>
                    `;
                    probListEl.appendChild(wrap);
                });
                
                setStatus("การวิเคราะห์เสร็จสมบูรณ์");
                latestPredictionId = data.id;
                feedbackSection.style.display = 'block';
                
            } catch (err) { 
                setStatus("เกิดข้อผิดพลาดในการเชื่อมต่อ Backend", true); 
                console.error(err);
            }
            finally { 
                btnPredict.disabled = false; 
                setTimeout(() => scanLine.classList.remove('active'), 1500); 
            }
        }
        async function sendFeedback(isCorrect){
            if(!latestPredictionId) return;

            try {
                const response = await fetch('/feedback', {method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: latestPredictionId, correct: isCorrect})
        });

                const data = await response.json();

                if(!response.ok){
                    throw new Error(data.error || 'feedback failed');
                }

                if(isCorrect){
                    setStatus('บันทึกว่า AI ทายถูกแล้ว');
                }else{
                    setStatus('บันทึกว่า AI ทายผิดแล้ว');
                }

                feedbackSection.style.display = 'none';

            } catch (err) {

                console.error(err);

                setStatus("ส่ง feedback ไม่สำเร็จ", true);
            }
    }


        btnCorrect.addEventListener('click', () => {
            sendFeedback(true);
        });


        btnWrong.addEventListener('click', () => {
            sendFeedback(false);
        });


        btnPredict.addEventListener('click', predictDigit);
        initCanvas();
    </script>
</body>
</html>
